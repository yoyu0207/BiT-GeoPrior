<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
<defs>
  <style>
    .title { font: 700 18px 'Times New Roman', serif; fill: #1f1f1f; }
    .label { font: 13px 'Times New Roman', serif; fill: #1f1f1f; }
    .small { font: 11px 'Times New Roman', serif; fill: #1f1f1f; }
    .tiny { font: 10px 'Times New Roman', serif; fill: #4a4a4a; }
    .box { stroke: #4c4c4c; stroke-width: 1.2; rx: 10; ry: 10; }
    .soft { fill: #f4efe3; }
    .cool { fill: #e8f2fb; }
    .mint { fill: #e8f4ee; }
    .rose { fill: #f8e7e7; }
    .sand { fill: #f6ecd2; }
    .gray { fill: #ececec; }
    .tokStroke { stroke: #4c4c4c; stroke-width: 1.0; }
    .arrow { stroke: #333333; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 4 3; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L8,3 L0,6 z" fill="#333333"/>
  </marker>
</defs>
<rect x="0" y="0" width="1180" height="520" fill="white"/>
<text x="590" y="34" class="title" text-anchor="middle">Fig. 2  Spatial Prior Gating (SPG) module</text>
<rect x="70" y="215" width="170" height="64" rx="10" ry="10" class="box cool" />
<text x="155" y="248" class="label" text-anchor="middle">Temporal feature map</text>
<text x="155" y="267" class="small" text-anchor="middle">F ∈ R^{C×H×W}</text>
<rect x="355" y="215" width="230" height="64" rx="10" ry="10" class="box sand" />
<text x="470" y="248" class="label" text-anchor="middle">Residual spatial gating</text>
<text x="470" y="267" class="small" text-anchor="middle">F + γ · (F ⊙ A)</text>
<rect x="700" y="215" width="170" height="64" rx="10" ry="10" class="box mint" />
<text x="785" y="248" class="label" text-anchor="middle">Prior-modulated</text>
<text x="785" y="267" class="label" text-anchor="middle">feature map</text>
<line x1="240" y1="247" x2="355" y2="247" class="arrow"/>
<line x1="585" y1="247" x2="700" y2="247" class="arrow"/>
<rect x="110" y="385" width="170" height="62" rx="10" ry="10" class="box rose" />
<text x="195" y="417" class="label" text-anchor="middle">Spatial prior</text>
<text x="195" y="436" class="small" text-anchor="middle">P ∈ R^{1×H₀×W₀}</text>
<rect x="365" y="382" width="165" height="68" rx="10" ry="10" class="box gray" />
<text x="447.5" y="412" class="label" text-anchor="middle">Bilinear resize</text>
<text x="447.5" y="431" class="small" text-anchor="middle">align to H × W</text>
<rect x="610" y="350" width="135" height="54" rx="10" ry="10" class="box soft" />
<text x="677.5" y="382" class="label" text-anchor="middle">1×1 Conv</text>
<rect x="610" y="417" width="135" height="54" rx="10" ry="10" class="box soft" />
<text x="677.5" y="449" class="label" text-anchor="middle">Sigmoid</text>
<rect x="830" y="382" width="170" height="68" rx="10" ry="10" class="box mint" />
<text x="915" y="412" class="label" text-anchor="middle">Channel attention</text>
<text x="915" y="431" class="small" text-anchor="middle">A ∈ (0,1)^{C×H×W}</text>
<line x1="280" y1="416" x2="365" y2="416" class="arrow"/>
<line x1="530" y1="416" x2="610" y2="377" class="arrow"/>
<line x1="677.5" y1="404" x2="677.5" y2="417" class="arrow"/>
<line x1="745" y1="444" x2="830" y2="416" class="arrow"/>
<line x1="915" y1="382" x2="915" y2="305" class="arrow"/>
<line x1="915" y1="305" x2="520" y2="305" class="arrow"/>
<line x1="520" y1="305" x2="520" y2="279" class="arrow"/>
<text x="522" y="328" class="tiny" text-anchor="middle">attention-guided residual modulation</text>
<text x="520" y="188" class="tiny" text-anchor="middle">identity initialization: γ = 0</text>
<rect x="938" y="120" width="180" height="78" rx="10" ry="10" class="box gray" />
<text x="1028" y="150" class="label" text-anchor="middle">Core operation</text>
<text x="1028" y="172" class="small" text-anchor="middle">A = σ(Conv₁×₁(P))</text>
<text x="1028" y="191" class="small" text-anchor="middle">F' = F + γ · (F ⊙ A)</text>
<line x1="1000" y1="198" x2="955" y2="382" class="arrow dash"/>
</svg>
