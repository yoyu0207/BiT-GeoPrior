<text x="405.0" y="693" class="small" text-anchor="middle">T2 image</text>

<rect x="90" y="450" width="175" height="78" rx="10" ry="10" class="box soft" />
<text x="177.5" y="486" class="label" text-anchor="middle">Shared BiT encoder</text>
<text x="177.5" y="506" class="small" text-anchor="middle">backbone + transformer</text>
<rect x="315" y="450" width="175" height="78" rx="10" ry="10" class="box soft" />
<text x="402.5" y="486" class="label" text-anchor="middle">Shared BiT encoder</text>
<text x="402.5" y="506" class="small" text-anchor="middle">backbone + transformer</text>
<line x1="180" y1="595" x2="177.5" y2="528" class="arrow"/>
<line x1="405" y1="595" x2="402.5" y2="528" class="arrow"/>
<rect x="620" y="568" width="170" height="78" rx="10" ry="10" class="box rose" />
<text x="705" y="602" class="label" text-anchor="middle">Ecological prior</text>
<text x="705" y="621" class="label" text-anchor="middle">encoder</text>
<text x="705" y="640" class="small" text-anchor="middle">from T1</text>
<line x1="255" y1="636" x2="620" y2="606" class="arrow"/>
<rect x="615" y="430" width="180" height="78" rx="10" ry="10" class="box mint" />
