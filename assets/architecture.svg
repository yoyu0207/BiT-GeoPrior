<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="760" viewBox="0 0 1380 760">
<defs>
  <style>
    .title { font: 700 18px 'Times New Roman', serif; fill: #1f1f1f; }
    .label { font: 13px 'Times New Roman', serif; fill: #1f1f1f; }
    .small { font: 11px 'Times New Roman', serif; fill: #1f1f1f; }
    .tiny { font: 10px 'Times New Roman', serif; fill: #4a4a4a; }
    .box { stroke: #4c4c4c; stroke-width: 1.2; rx: 10; ry: 10; }
    .soft { fill: #f4efe3; }
    .cool { fill: #e8f2fb; }
    .mint { fill: #e8f4ee; }
    .rose { fill: #f8e7e7; }
    .sand { fill: #f6ecd2; }
    .gray { fill: #ececec; }
    .tokStroke { stroke: #4c4c4c; stroke-width: 1.0; }
    .arrow { stroke: #333333; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 4 3; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L8,3 L0,6 z" fill="#333333"/>
  </marker>
</defs>
<rect x="0" y="0" width="1380" height="760" fill="white"/>
<text x="690" y="36" class="title" text-anchor="middle">Fig. 3  Overall architecture of G-OEP-BiT</text>
<rect x="105" y="595" width="150" height="82" rx="6" ry="6" fill="#d7e9f8" class="tokStroke"/>
<rect x="115" y="605" width="130" height="62" rx="4" ry="4" fill="white" fill-opacity="0.28" stroke="#555" stroke-width="0.8"/>
<rect x="129" y="613" width="102" height="46" rx="4" ry="4" fill="none" stroke="#666" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="180.0" y="693" class="small" text-anchor="middle">T1 image (2020)</text>

<rect x="330" y="595" width="150" height="82" rx="6" ry="6" fill="#d7e9f8" class="tokStroke"/>
<rect x="340" y="605" width="130" height="62" rx="4" ry="4" fill="white" fill-opacity="0.28" stroke="#555" stroke-width="0.8"/>
