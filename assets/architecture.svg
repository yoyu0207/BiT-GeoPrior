<text x="705" y="483" class="small" text-anchor="middle">P ∈ R^{1×H×W}</text>
<line x1="705" y1="568" x2="705" y2="508" class="arrow"/>
<rect x="910" y="430" width="145" height="78" rx="10" ry="10" class="box cool" />
