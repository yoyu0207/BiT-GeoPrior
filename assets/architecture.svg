<line x1="490" y1="489" x2="1120" y2="466" class="arrow"/>
<line x1="795" y1="469" x2="910" y2="469" class="arrow"/>
<line x1="795" y1="469" x2="1120" y2="469" class="arrow"/>
<rect x="945" y="285" width="290" height="74" rx="10" ry="10" class="box gray" />
<text x="1090" y="318" class="label" text-anchor="middle">Feature fusion</text>
<text x="1090" y="337" class="small" text-anchor="middle">[F₁' ; F₂']</text>
<line x1="982.5" y1="430" x2="1018" y2="359" class="arrow"/>
<line x1="1192.5" y1="430" x2="1162" y2="359" class="arrow"/>
<rect x="960" y="162" width="260" height="74" rx="10" ry="10" class="box sand" />
<text x="1090" y="194" class="label" text-anchor="middle">Change decoder</text>
<text x="1090" y="214" class="small" text-anchor="middle">Upsample + Conv layers</text>
<line x1="1090" y1="285" x2="1090" y2="236" class="arrow"/>
<rect x="988" y="60" width="205" height="62" rx="10" ry="10" class="box mint" />
