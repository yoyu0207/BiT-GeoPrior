<text x="1090" y="108" class="small" text-anchor="middle">G-OEP-BiT output</text>
<line x1="1090" y1="162" x2="1090" y2="122" class="arrow"/>
<rect x="65" y="112" width="245" height="92" rx="10" ry="10" class="box gray" />
<text x="187.5" y="142" class="label" text-anchor="middle">Image-driven branch</text>
<text x="187.5" y="164" class="small" text-anchor="middle">captures bitemporal change</text>
<text x="187.5" y="184" class="small" text-anchor="middle">features with shared BiT encoder</text>
<line x1="310" y1="158" x2="390" y2="450" class="arrow dash"/>
<rect x="420" y="112" width="270" height="92" rx="10" ry="10" class="box gray" />
<text x="555" y="142" class="label" text-anchor="middle">Ecological prior branch</text>
<text x="555" y="164" class="small" text-anchor="middle">learns former Spartina tendency</text>
<text x="555" y="184" class="small" text-anchor="middle">from the pre-eradication image</text>
<line x1="690" y1="158" x2="705" y2="430" class="arrow dash"/>
<rect x="1090" y="560" width="220" height="88" rx="10" ry="10" class="box gray" />
<text x="1200" y="590" class="label" text-anchor="middle">Key idea</text>
<text x="1200" y="612" class="small" text-anchor="middle">ecological context is injected</text>
<text x="1200" y="632" class="small" text-anchor="middle">at the feature level rather than</text>
<text x="1200" y="652" class="small" text-anchor="middle">used as post-processing</text>
<line x1="1120" y1="560" x2="1035" y2="508" class="arrow dash"/>
</svg>
